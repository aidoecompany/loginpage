<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Recuria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <!-- YOUR ORIGINAL CSS (UNCHANGED) -->
  <style>
  /* ---- everything below is EXACTLY your CSS ---- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:#111111;
    --grey-1:#444444;
    --grey-2:#888888;
    --grey-3:#bbbbbb;
    --grey-4:#e5e5e5;
    --grey-5:#f4f4f2;
    --white:#ffffff;
    --red:#c0392b;
    --red-bg:#fff5f5;
    --red-bdr:#ffcccc;
    --green:#1a7f50;
    --green-bg:#f0faf5;
    --green-bdr:#b5e8cf;
    --ff-serif:'DM Serif Display', serif;
    --ff-sans:'DM Sans', sans-serif;
  }

  html,body{
    height:100%;
    background:var(--grey-5);
    font-family:var(--ff-sans);
  }

  #app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:44px 20px 28px;
  }

  .brand{text-align:center;}
  .brand-name{
    font-family:var(--ff-serif);
    font-size:clamp(26px,7vw,36px);
  }

  .brand-sub{
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--grey-3);
  }

  .card{
    width:100%;
    max-width:400px;
    background:white;
    border-radius:20px;
    border:1px solid #e8e8e6;
    padding:40px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  .field{display:flex;flex-direction:column;gap:6px;}

  .field-input{
    font-size:14px;
    background:#fafafa;
    border:1.5px solid var(--grey-4);
    border-radius:10px;
    padding:11px 14px;
  }

  .btn-primary{
    font-size:14px;
    font-weight:600;
    background:var(--black);
    color:white;
    border:none;
    border-radius:10px;
    padding:13px 0;
    width:100%;
    cursor:pointer;
  }

  .banner-error{
    color:red;
    display:none;
  }

  .banner-success{
    color:green;
    display:none;
  }

  .banner-error.show,
  .banner-success.show{
    display:block;
  }

  .view{display:none;}
  .view.active{display:flex;flex-direction:column;gap:16px;}
  </style>
</head>

<body>

<div id="app">

<div class="brand">
<div class="brand-name">Recuria</div>
<div class="brand-sub">Powered by Aidoe</div>
</div>

<div class="card">

<div class="view active" id="viewLogin">

<input class="field-input" id="loginEmail" type="email" placeholder="Email">
<input class="field-input" id="loginPassword" type="password" placeholder="Password">

<div class="banner-error" id="loginError"></div>

<button class="btn-primary" id="loginBtn" onclick="handleLogin()">Sign In</button>

<button onclick="showView('viewSignup')">Sign Up</button>

</div>

<div class="view" id="viewSignup">

<input class="field-input" id="signupEmail" type="email">
<input class="field-input" id="signupPassword" type="password">

<div class="banner-error" id="signupError"></div>
<div class="banner-success" id="signupSuccess"></div>

<button class="btn-primary" id="signupBtn" onclick="handleSignup()">Create Account</button>

<button onclick="showView('viewLogin')">Back</button>

</div>

</div>

</div>

<!-- SUPABASE IMPORT (ADDED) -->
<script type="module">
import { supabase } from "./supabaseClient.js";
window.supabase = supabase;
</script>

<script>

function showView(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function showError(id,msg){
const el=document.getElementById(id);
el.textContent=msg;
el.classList.add('show');
}

function showSuccess(id,msg){
const el=document.getElementById(id);
el.textContent=msg;
el.classList.add('show');
}

async function handleLogin(){

const email=document.getElementById('loginEmail').value.trim();
const password=document.getElementById('loginPassword').value;

const { error } = await window.supabase.auth.signInWithPassword({
email,
password
});

if(error){
showError('loginError',error.message);
return;
}

window.location.href="/dashboard";

}

async function handleSignup(){

const email=document.getElementById('signupEmail').value.trim();
const password=document.getElementById('signupPassword').value;

const { error } = await window.supabase.auth.signUp({
email,
password
});

if(error){
showError('signupError',error.message);
return;
}

showSuccess('signupSuccess','Account created. Check your email.');

}

</script>

</body>
</html>
