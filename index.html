<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Recuria</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<style>
/* SAME UI — ONLY ONE FIX BELOW */
.otp-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}
.otp-box {
  width: 40px;
  height: 52px;
  font-size: 18px;
}
</style>
</head>

<body>

<!-- KEEP EVERYTHING SAME ABOVE -->

<!-- ADD RESET PASSWORD VIEW -->
<div class="view" id="viewResetPassword">

  <div class="field">
    <label class="field-label">New Password</label>
    <input class="field-input" type="password" id="newPassword" />
  </div>

  <div class="field">
    <label class="field-label">Confirm Password</label>
    <input class="field-input" type="password" id="confirmPassword" />
  </div>

  <div class="banner-error" id="resetError"></div>

  <button class="btn-primary" onclick="handlePasswordReset()">
    Update Password
  </button>

</div>

<script type="module">
import { supabase } from "./supabaseClient.js";

let otpEmail = "";

// ───────── OTP FIXES ─────────

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if (id === 'viewForgotOTP') {
    [0,1,2,3,4,5,6,7].forEach(i => document.getElementById('otp'+i).value = '');
  }
}

// ───────── FORGOT ─────────
window.handleForgotNext = async function () {
  const email = forgotEmail.value.trim();
  otpEmail = email;

  await supabase.auth.resetPasswordForEmail(email);
  otpEmailDisplay.textContent = email;
  showView('viewForgotOTP');
};

// ───────── OTP INPUT ─────────
window.otpInput = function(el, idx) {
  el.value = el.value.replace(/\D/g, '').slice(-1);

  if (el.value && idx < 7) {
    document.getElementById('otp' + (idx + 1)).focus();
  }

  const all = [0,1,2,3,4,5,6,7].map(i => document.getElementById('otp'+i).value);
  if (all.every(v => v !== '')) handleOTPVerify();
};

// ───────── PASTE FIX ─────────
document.addEventListener('paste', function(e) {
  const active = document.activeElement;
  if (!active.classList.contains('otp-box')) return;

  e.preventDefault();

  const pasted = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,8);

  pasted.split('').forEach((ch,i)=>{
    const box = document.getElementById('otp'+i);
    if (box) box.value = ch;
  });
});

// ───────── REAL OTP VERIFY ─────────
window.handleOTPVerify = async function () {

  const code = [0,1,2,3,4,5,6,7]
    .map(i => document.getElementById('otp'+i).value)
    .join('');

  const { error } = await supabase.auth.verifyOtp({
    email: otpEmail,
    token: code,
    type: "recovery"
  });

  if (error) {
    otpError.textContent = "Invalid OTP";
    otpError.classList.add("show");
  } else {
    showView("viewResetPassword");
  }
};

// ───────── PASSWORD RESET ─────────
window.handlePasswordReset = async function () {

  const newPass = newPassword.value;
  const confirmPass = confirmPassword.value;

  if (newPass !== confirmPass) {
    resetError.textContent = "Passwords do not match";
    resetError.classList.add("show");
    return;
  }

  const { error } = await supabase.auth.updateUser({
    password: newPass
  });

  if (error) {
    resetError.textContent = error.message;
    resetError.classList.add("show");
  } else {
    window.location.href = "https://dashboard2-0-black.vercel.app/";
  }
};

// ───────── RESEND ─────────
window.handleResendOTP = async function () {
  await supabase.auth.resetPasswordForEmail(otpEmail);
};
</script>

</body>
</html>
